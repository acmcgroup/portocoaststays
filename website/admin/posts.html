<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog Posts — Porto Coast Stays Admin</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>
<div class="admin-wrapper">
  <div id="sidebar-mount"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-heading"><h1>Blog Posts</h1></div>
      <div class="topbar-actions">
        <input id="search" placeholder="Filtrar posts…" style="padding:8px 12px;border:1px solid var(--admin-border);border-radius:var(--admin-radius);font-size:.84rem;width:200px"/>
        <select id="filter-status" style="padding:8px 12px;border:1px solid var(--admin-border);border-radius:var(--admin-radius);font-size:.84rem">
          <option value="">Todos os estados</option>
          <option value="published">Publicados</option>
          <option value="draft">Rascunhos</option>
          <option value="archived">Arquivados</option>
        </select>
        <a href="/admin/editor" class="btn btn-accent">+ Novo Post</a>
        <button id="btn-publish-site" type="button" class="btn btn-primary">🌐 Publicar Site</button>
      </div>
    </div>
    <div class="content-area">
      <div class="stats-row" id="stats-row">
        <div class="stat-box"><div class="stat-val" id="stat-total">—</div><div class="stat-label">Total</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-pub">—</div><div class="stat-label">Publicados</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-draft">—</div><div class="stat-label">Rascunhos</div></div>
      </div>

      <div id="pending-banner" class="alert alert-warning" style="display:none">
        <strong>Posts com alterações após publicação.</strong> Clique «Publicar Site» para regenerar o blog.
        <button id="btn-publish-site-banner" class="btn btn-accent btn-sm" style="margin-left:12px">🌐 Publicar Site</button>
      </div>

      <div class="card">
        <div class="card-header"><h2>Posts</h2><span id="count-label" style="font-size:.8rem;color:var(--admin-text-muted)"></span></div>
        <div style="overflow-x:auto">
          <table class="data-table" id="posts-table">
            <thead>
              <tr>
                <th>Capa</th>
                <th>Título PT</th>
                <th>Título EN</th>
                <th>Tipo</th>
                <th>Data</th>
                <th>Estado</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="posts-tbody">
              <tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--admin-text-muted)">A carregar…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
<script src="sidebar.js"></script>
<script>
(async () => {
  'use strict';
  const session = await initSidebar('posts', ['admin']);
  if (!session) return;

  let allPosts = [];

  const POST_KIND_LABELS = { article: 'Artigo', report: 'Relatório', case_study: 'Caso' };
  function labelKind(k) { return POST_KIND_LABELS[String(k||'article').replace(/-/g,'_')] || k; }

  async function triggerBuild() {
    const btn = document.getElementById('btn-publish-site');
    const btnB = document.getElementById('btn-publish-site-banner');
    [btn, btnB].forEach(b => { if(b) { b.disabled = true; b.textContent = 'A publicar…'; } });
    try {
      await AdminPortal.dispararBuildSitePublico();
      AdminPortal.toast('Build iniciado — site atualizado em ~1 min.', 'success', 7000);
      document.getElementById('pending-banner').style.display = 'none';
    } catch(e) { AdminPortal.toast('Erro no build: ' + e.message, 'error'); }
    finally { [btn, btnB].forEach(b => { if(b) { b.disabled = false; b.textContent = '🌐 Publicar Site'; } }); }
  }

  document.getElementById('btn-publish-site').addEventListener('click', triggerBuild);
  document.getElementById('btn-publish-site-banner').addEventListener('click', triggerBuild);

  async function carregarPosts() {
    try {
      const { data, count } = await AdminPortal.listarPosts({
        status: document.getElementById('filter-status').value || null,
        pesquisa: document.getElementById('search').value,
      });
      allPosts = data || [];
      renderPosts(allPosts, count);
    } catch(e) { AdminPortal.toast('Erro ao carregar posts: ' + e.message, 'error'); }
  }

  function renderPosts(posts, count) {
    document.getElementById('count-label').textContent = count != null ? `${count} post${count !== 1 ? 's' : ''}` : '';
    document.getElementById('stat-total').textContent = posts.length;
    document.getElementById('stat-pub').textContent   = posts.filter(p => p.status === 'published').length;
    document.getElementById('stat-draft').textContent = posts.filter(p => p.status === 'draft').length;

    const nPending = posts.filter(p => AdminPortal.postTemAlteracoesAposPublicacao(p)).length;
    document.getElementById('pending-banner').style.display = nPending > 0 ? 'block' : 'none';

    const tbody = document.getElementById('posts-tbody');
    if (!posts.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--admin-text-muted)">Nenhum post encontrado</td></tr>';
      return;
    }

    tbody.innerHTML = '';
    posts.forEach(post => {
      const pending = AdminPortal.postTemAlteracoesAposPublicacao(post);
      const date = post.published_at
        ? new Date(post.published_at).toLocaleDateString('pt-PT')
        : (post.created_at ? new Date(post.created_at).toLocaleDateString('pt-PT') : '—');
      const thumb = post.featured_image_url
        ? `<img src="${AdminPortal.escapeHtml(post.featured_image_url)}" style="height:52px;width:78px;object-fit:cover;border-radius:4px;border:1px solid var(--admin-border)" loading="lazy"/>`
        : '<span style="color:var(--admin-text-muted);font-size:.8rem">—</span>';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${thumb}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${AdminPortal.escapeHtml(post.pt_title) || '<em style="color:var(--admin-text-muted)">sem título</em>'}</td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${AdminPortal.escapeHtml(post.en_title) || '—'}</td>
        <td><span style="font-size:.8rem">${labelKind(post.post_kind)}</span></td>
        <td><time style="font-size:.82rem">${date}</time></td>
        <td>
          <span class="badge badge-${post.status}">${post.status === 'published' ? 'Publicado' : post.status === 'draft' ? 'Rascunho' : 'Arquivado'}</span>
          ${pending ? '<span class="badge badge-crit-urgente" style="margin-left:4px">pendente</span>' : ''}
        </td>
        <td style="white-space:nowrap;display:flex;gap:6px;flex-wrap:wrap">
          <a class="btn btn-sm btn-secondary" href="/admin/editor?id=${post.id}">Editar</a>
          <a class="btn btn-sm btn-secondary" href="/admin/preview?id=${post.id}" target="_blank">Preview</a>
          ${post.status !== 'published'
            ? `<button class="btn btn-sm btn-success" data-publish="${post.id}">Publicar</button>`
            : `<button class="btn btn-sm btn-secondary" data-unpublish="${post.id}">Despublicar</button>`}
          <button class="btn btn-sm btn-danger" data-delete="${post.id}">Apagar</button>
        </td>`;
      tbody.appendChild(tr);
    });

    tbody.querySelectorAll('[data-publish]').forEach(btn => btn.addEventListener('click', async () => {
      try { await AdminPortal.publicarPost(btn.dataset.publish); AdminPortal.toast('Post publicado!', 'success'); carregarPosts(); await AdminPortal.agendarBuildSitePublico(); }
      catch(e) { AdminPortal.toast(e.message, 'error'); }
    }));
    tbody.querySelectorAll('[data-unpublish]').forEach(btn => btn.addEventListener('click', async () => {
      try { await AdminPortal.despublicarPost(btn.dataset.unpublish); AdminPortal.toast('Post despublicado', 'info'); carregarPosts(); }
      catch(e) { AdminPortal.toast(e.message, 'error'); }
    }));
    tbody.querySelectorAll('[data-delete]').forEach(btn => btn.addEventListener('click', async () => {
      const post = allPosts.find(p => p.id === btn.dataset.delete);
      if (!confirm(`Apagar permanentemente:\n"${post?.pt_title || btn.dataset.delete}"?\n\nEsta acção é irreversível.`)) return;
      try { await AdminPortal.apagarPost(btn.dataset.delete); AdminPortal.toast('Post apagado', 'info'); carregarPosts(); }
      catch(e) { AdminPortal.toast(e.message, 'error'); }
    }));
  }

  document.getElementById('search').addEventListener('input', () => {
    clearTimeout(window._sd); window._sd = setTimeout(carregarPosts, 350);
  });
  document.getElementById('filter-status').addEventListener('change', carregarPosts);
  carregarPosts();
})();
</script>
</body>
</html>
