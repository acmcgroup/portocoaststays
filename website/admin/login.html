<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Porto Coast Stays</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>
<div class="login-outer">
  <div class="login-wrapper">
    <div class="login-header">
      <h1 class="sr-only">Porto Coast Stays — Admin</h1>
      <img class="login-brand-logo" src="/assets/images/logo.svg" alt="Porto Coast Stays"/>
      <p class="login-tagline">Portal de Gestão</p>
    </div>
    <div class="login-body">
      <div class="login-erro" id="login-erro"></div>
      <form id="form-login">
        <div class="campo-a campo-mb">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="admin@portocoaststays.com" required autocomplete="email"/>
        </div>
        <div class="campo-a campo-mb-lg">
          <label for="senha">Palavra-passe</label>
          <div class="password-wrapper">
            <input type="password" id="senha" placeholder="A sua palavra-passe" required autocomplete="current-password"/>
            <button type="button" class="btn-ver" id="btn-ver" aria-label="Ver palavra-passe">
              <svg id="icone-ver" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="login-btn" id="btn-login">Entrar</button>
      </form>
      <p class="login-footer-hint">
        Novo proprietário? <a href="register.html">Criar conta</a>
      </p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
<script src="login.js"></script>
</body>
</html>
