<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Imóveis — Porto Coast Stays Admin</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>
<div class="admin-wrapper">
  <div id="sidebar-mount"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-heading"><h1>Imóveis</h1></div>
      <div class="topbar-actions">
        <select id="filter-status" style="padding:8px 12px;border:1px solid var(--admin-border);border-radius:var(--admin-radius);font-size:.84rem">
          <option value="">Todos os estados</option>
          <option value="setup">Em configuração</option>
          <option value="active">Activos</option>
          <option value="suspended">Suspensos</option>
          <option value="closed">Encerrados</option>
        </select>
        <a href="/admin/property" class="btn btn-accent">+ Novo Imóvel</a>
      </div>
    </div>
    <div class="content-area">
      <div class="stats-row">
        <div class="stat-box"><div class="stat-val" id="stat-total">—</div><div class="stat-label">Total</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-active">—</div><div class="stat-label">Activos</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-setup">—</div><div class="stat-label">Setup</div></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Lista de imóveis</h2><span id="count-label" style="font-size:.8rem;color:var(--admin-text-muted)"></span></div>
        <div style="overflow-x:auto">
          <table class="data-table" id="properties-table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Município</th>
                <th>Tipologia</th>
                <th>RNAL</th>
                <th>Proprietário</th>
                <th>Estado</th>
                <th>Progresso</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="properties-tbody">
              <tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--admin-text-muted)">A carregar…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
<script src="sidebar.js"></script>
<script>
(async () => {
  'use strict';
  const session = await initSidebar('properties');
  if (!session) return;

  const role = await AdminPortal.obterMeuRole();

  async function carregarPropriedades() {
    try {
      const { data } = await AdminPortal.listarPropriedades({
        status: document.getElementById('filter-status').value || null,
      });
      renderPropriedades(data || []);
    } catch(e) { AdminPortal.toast('Erro: ' + e.message, 'error'); }
  }

  function propStatusBadge(s) {
    const labels = { setup: 'Setup', active: 'Activo', suspended: 'Suspenso', closed: 'Encerrado' };
    return `<span class="badge badge-prop-${s}">${labels[s] || s}</span>`;
  }
  const TYPO = { apartamento: 'Apartamento', moradia: 'Moradia', quarto: 'Quarto', outro: 'Outro' };

  function renderPropriedades(props) {
    document.getElementById('count-label').textContent = `${props.length} imóvel${props.length !== 1 ? 's' : ''}`;
    document.getElementById('stat-total').textContent  = props.length;
    document.getElementById('stat-active').textContent = props.filter(p => p.status === 'active').length;
    document.getElementById('stat-setup').textContent  = props.filter(p => p.status === 'setup').length;

    const tbody = document.getElementById('properties-tbody');
    if (!props.length) {
      tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--admin-text-muted)">
        Nenhum imóvel. ${role === 'admin' ? '<a href="/admin/property">Criar o primeiro →</a>' : ''}
      </td></tr>`;
      return;
    }
    tbody.innerHTML = '';
    props.forEach(prop => {
      const owner = prop.profiles ? `${AdminPortal.escapeHtml(prop.profiles.nome || '')} <span style="font-size:.75rem;color:var(--admin-text-muted)">${AdminPortal.escapeHtml(prop.profiles.email || '')}</span>` : '—';
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="font-weight:500">${AdminPortal.escapeHtml(prop.name) || '<em style="font-weight:400;color:var(--admin-text-muted)">sem nome</em>'}</td>
        <td>${AdminPortal.escapeHtml(prop.municipality) || '—'}</td>
        <td style="font-size:.84rem">${TYPO[prop.typology] || prop.typology}</td>
        <td style="font-family:monospace;font-size:.8rem">${AdminPortal.escapeHtml(prop.rnal_number) || '<span style="color:var(--admin-text-muted)">pendente</span>'}</td>
        <td style="font-size:.84rem">${owner}</td>
        <td>${propStatusBadge(prop.status)}</td>
        <td>
          <div id="prog-${prop.id}" style="min-width:120px">
            <div class="progress-bar-wrap"><div class="progress-bar-fill" id="fill-${prop.id}" style="width:0%"></div></div>
            <div class="progress-label" id="plabel-${prop.id}">…</div>
          </div>
        </td>
        <td style="white-space:nowrap;display:flex;gap:6px">
          <a class="btn btn-sm btn-secondary" href="/admin/property?id=${prop.id}">Editar</a>
          <a class="btn btn-sm btn-primary" href="/admin/property-tasks?id=${prop.id}">Tasks</a>
          ${role === 'admin' ? `<button class="btn btn-sm btn-danger" data-delete="${prop.id}">Apagar</button>` : ''}
        </td>`;
      tbody.appendChild(tr);
      loadProgress(prop.id);
    });

    tbody.querySelectorAll('[data-delete]').forEach(btn => btn.addEventListener('click', async () => {
      if (!confirm('Apagar este imóvel e todas as suas tasks? Irreversível.')) return;
      try { await AdminPortal.apagarPropriedade(btn.dataset.delete); AdminPortal.toast('Imóvel apagado', 'info'); await carregarPropriedades(); }
      catch(e) { AdminPortal.toast(e.message, 'error'); }
    }));
  }

  async function loadProgress(propertyId) {
    try {
      const statuses = await AdminPortal.listarPropertyTaskStatus(propertyId);
      const templates = await AdminPortal.listarTaskTemplates({ ambito: 'A' });
      const total = templates.length;
      const done  = statuses.filter(s => s.status === 'completed').length;
      const pct   = total ? Math.round((done / total) * 100) : 0;
      const fill  = document.getElementById(`fill-${propertyId}`);
      const label = document.getElementById(`plabel-${propertyId}`);
      if (fill)  fill.style.width = pct + '%';
      if (label) label.textContent = `${done}/${total} tasks (${pct}%)`;
    } catch(_) {}
  }

  document.getElementById('filter-status').addEventListener('change', carregarPropriedades);
  await carregarPropriedades();
})();
</script>
</body>
</html>
